<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1, viewport-fit=cover"
      name="viewport"
    />
    <meta content="#eaf6ff" name="theme-color" />
    <title>Nobu</title>
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #dff4ff 0%, #f7fbff 58%, #edf6ff 100%);
        color: #2b4254;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 420px;
      }

      p {
        margin: 0;
        color: #e85d9b;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 44px;
        line-height: 0.95;
      }

      span {
        color: rgba(43, 66, 84, 0.66);
        font-size: 15px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Nobu</p>
      <h1>Nobu is opening.</h1>
      <span>Your personal voice assistant is loading the studio.</span>
    </main>
  </body>
</html>
