<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1, viewport-fit=cover"
      name="viewport"
    />
    <meta content="#7c3aed" name="theme-color" />
    <title>Nobu</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(145deg, #0d0014, #1a0030 72%, #0d0014);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 420px;
      }

      p {
        margin: 0;
        color: #ffd580;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 44px;
        line-height: 0.95;
      }

      span {
        color: rgba(255, 255, 255, 0.66);
        font-size: 15px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Nobu</p>
      <h1>Connect your app URL.</h1>
      <span>Set CAPACITOR_SERVER_URL to your deployed Nobu app, then run cap sync.</span>
    </main>
  </body>
</html>
